<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In — GST Extractor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0D2137 0%,#1565C0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:420px;overflow:hidden}
.card-top{background:linear-gradient(135deg,#0D2137,#1565C0);padding:32px 32px 28px;text-align:center}
.card-top h1{color:#fff;font-size:1.5rem;font-weight:800;margin-bottom:4px}
.card-top p{color:rgba(255,255,255,.7);font-size:.85rem}
.card-body{padding:32px}
.field{margin-bottom:18px}
label{display:block;font-size:.82rem;font-weight:600;color:#546E7A;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid #CFD8DC;border-radius:8px;font-size:.9rem;color:#263238;outline:none;transition:border-color .2s}
input:focus{border-color:#1565C0;box-shadow:0 0 0 3px rgba(21,101,192,.12)}
.btn{width:100%;padding:13px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#0D47A1}
.divider{text-align:center;margin:20px 0;color:#90A4AE;font-size:.82rem}
.link-btn{display:block;text-align:center;padding:11px;border:1.5px solid #CFD8DC;border-radius:8px;color:#546E7A;text-decoration:none;font-size:.88rem;font-weight:600;transition:all .2s}
.link-btn:hover{border-color:#1565C0;color:#1565C0}
.msg{padding:10px 14px;border-radius:7px;margin-bottom:16px;font-size:.85rem;font-weight:500;background:#FFEBEE;border-left:4px solid #C62828;color:#C62828}
</style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <h1>📄 GST Extractor</h1>
    <p>AI-Powered Invoice Processing</p>
  </div>
  <div class="card-body">
    {% if messages %}
      {% for m in messages %}<div class="msg">{{ m }}</div>{% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username"
               value="{{ request.POST.username }}" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="divider">— or —</div>
    <a href="{% url 'accounts:signup' %}" class="link-btn">Create a new account</a>
  </div>
</div>
</body>
</html>
