{% load static %}
<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Login | GST Converter Pro</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
  <link rel='stylesheet' href='{% static "css/style.css" %}'>
</head>
<body class='auth-body'>
  <div class='auth-bg'></div>
  <div class='auth-container'>
    <div class='auth-card'>
      <div class='auth-header'>
        <div class='auth-logo'><i class='bi bi-file-earmark-spreadsheet-fill'></i></div>
        <h2>GST Converter Pro</h2>
        <p>Sign in to your account</p>
      </div>
      {% if messages %}
        {% for msg in messages %}
          <div class='alert alert-{{ msg.tags }}'>{{ msg }}</div>
        {% endfor %}
      {% endif %}
      <form method='post' class='auth-form'>
        {% csrf_token %}
        <div class='mb-3'>
          <label class='form-label'>Username</label>
          <div class='input-group'>
            <span class='input-group-text'><i class='bi bi-person'></i></span>
            {{ form.username }}
          </div>
        </div>
        <div class='mb-4'>
          <label class='form-label'>Password</label>
          <div class='input-group'>
            <span class='input-group-text'><i class='bi bi-lock'></i></span>
            {{ form.password }}
          </div>
        </div>
        <button type='submit' class='btn btn-primary btn-auth w-100'>
          <i class='bi bi-box-arrow-in-right me-2'></i>Sign In
        </button>
      </form>
      <div class='auth-footer'>
        <p>Don't have an account? <a href='{% url "signup" %}'>Create Account</a></p>
      </div>
    </div>
  </div>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
